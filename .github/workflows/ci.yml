name: CI

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  lint:
    runs-on: ubuntu-latest
    name: ShellCheck Lint

    steps:
      - uses: actions/checkout@v4

      - name: Install ShellCheck
        run: sudo apt-get update && sudo apt-get install -y shellcheck

      - name: Run ShellCheck on main script
        run: shellcheck bin/gitkeeper

      - name: Run ShellCheck on lib scripts
        run: |
          shellcheck lib/config.sh
          shellcheck lib/analyze.sh
          shellcheck lib/ui.sh
          shellcheck lib/delete.sh
          shellcheck lib/github.sh
          shellcheck lib/discovery.sh
          shellcheck lib/colors.sh

      - name: Check installation scripts
        run: |
          shellcheck scripts/install-macos.sh
          shellcheck scripts/setup-alias.sh

      - name: Validate JSON config
        run: jq . templates/config.json > /dev/null

  test:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest]
    name: Test on ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          if [ "$RUNNER_OS" = "macOS" ]; then
            brew install jq fzf git
          else
            sudo apt-get update && sudo apt-get install -y jq fzf git
          fi
        shell: bash

      - name: Make scripts executable
        run: chmod +x bin/gitkeeper lib/*.sh scripts/*.sh

      - name: Test help output
        run: bin/gitkeeper --help | head -5

      - name: Verify config template
        run: jq . templates/config.json

      - name: Test in git repo
        run: |
          mkdir -p test-repo
          cd test-repo
          git init
          git config user.name "Test User"
          git config user.email "test@example.com"
          echo "test" > file.txt
          git add file.txt
          git commit -m "Initial commit"
          ../bin/gitkeeper --dry-run || echo "Note: No branches to clean"

  code-quality:
    runs-on: ubuntu-latest
    name: Code Quality

    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y shellcheck jq

      - name: Run make lint
        run: |
          cd /tmp
          cp -r "$GITHUB_WORKSPACE" gitkeeper
          cd gitkeeper
          make lint

