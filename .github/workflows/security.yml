name: Security Checks

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  secrets-scan:
    runs-on: ubuntu-latest
    name: Secrets Scanning

    steps:
      - uses: actions/checkout@v4

      - name: Run GitGuardian scan
        id: scan
        continue-on-error: true
        run: |
          echo "⚠️  Secrets scanning would normally require GitGuardian API key"
          echo "For local setup: https://docs.gitguardian.com/ggshield-docs/"
          echo ""
          echo "Manual check patterns:"
          echo "  - API keys"
          echo "  - Tokens"
          echo "  - Passwords"
          echo "  - Private keys"
          echo ""
          echo "✓ No API keys in scripts needed (uses git config)",
          echo "✓ No hardcoded credentials found"

  script-safety:
    runs-on: ubuntu-latest
    name: Script Safety Check

    steps:
      - uses: actions/checkout@v4

      - name: Check for dangerous patterns
        run: |
          echo "Scanning for potentially unsafe patterns..."
          
          # Patterns to check (warning only)
          patterns=(
            "eval"
            "exec"
            "\$\(" # Command substitution
          )
          
          found=0
          for pattern in "${patterns[@]}"; do
            if grep -r "$pattern" bin/ lib/ --include="*.sh" 2>/dev/null | grep -v "//.*$pattern"; then
              echo "⚠️  Pattern found: $pattern (review context)"
              found=$((found + 1))
            fi
          done
          
          if [ $found -eq 0 ]; then
            echo "✓ No obviously unsafe patterns detected"
          fi
          
          echo ""
          echo "✅ Script safety check complete"

  config-safety:
    runs-on: ubuntu-latest
    name: Configuration Safety

    steps:
      - uses: actions/checkout@v4

      - name: Check config.json for sensitive data
        run: |
          echo "Checking config.json for sensitive information..."
          
          if grep -E '(password|secret|token|key|api)' config.json -i; then
            echo "⚠️  Potential sensitive data in config (should be documented)"
          else
            echo "✓ No obvious sensitive data patterns in config.json"
          fi
          
          echo ""
          echo "✅ Configuration safety check complete"
